services:
  - type: web
    name: NexusBot
    runtime: node
    buildCommand: pnpm --filter @workspace/api-server run build && pip install ddgs
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
